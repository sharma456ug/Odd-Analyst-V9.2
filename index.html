<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sniper Engine v9.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:oklch(55% 0.18 260);--brand-2:oklch(48% 0.18 260);--brand-soft:oklch(96% 0.04 260);
  --green:oklch(50% 0.17 150);--green-soft:oklch(96% 0.04 150);
  --red:oklch(50% 0.18 25);--red-soft:oklch(96% 0.04 25);
  --amber:oklch(66% 0.14 75);--amber-soft:oklch(96% 0.04 75);
  --live:oklch(54% 0.18 25);
  --surface:#ffffff;--surface-2:#f6f7fb;--surface-3:#eceef5;
  --border:#e2e5ef;--border-2:#cdd0df;
  --text:#1a1d2e;--text-2:#4a4f6a;--text-3:#8287a0;
  --radius:14px;--radius-lg:20px;
  --sh-sm:0 1px 4px rgba(30,35,70,.07);
  --sh-md:0 4px 16px rgba(30,35,70,.10);
  --sh-lg:0 12px 40px rgba(30,35,70,.16);
  --ease:cubic-bezier(.4,0,.2,1);
  --nav-h:46px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--surface-2);color:var(--text);min-height:100vh;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,b,strong{font-family:'Manrope',sans-serif}
input,button,select{font-family:inherit;font-size:inherit}
button{cursor:pointer;-webkit-appearance:none}
a{color:var(--brand)}
img{max-width:100%}

/* ── Hero ── */
.hero{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:14px;background:linear-gradient(135deg,#1e2fa0,#3b2f8f);padding:16px 18px;color:#fff}
.hero-mark{width:44px;height:44px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.hero-mark svg{width:26px;height:26px;stroke:#1e2fa0}
.hero-copy h1{font-size:1.12rem;font-weight:800;letter-spacing:-0.01em;line-height:1.2}
.hero-copy p{font-size:0.68rem;opacity:.72;margin-top:3px;line-height:1.4}
.hero-clock{text-align:right;flex-shrink:0}
.hero-clock span{display:block;font-size:0.62rem;opacity:.7;letter-spacing:.04em}
.hero-clock b{font-family:'Manrope';font-size:1.05rem;font-weight:800;letter-spacing:.02em}

/* ── Nav ── */
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;-webkit-overflow-scrolling:touch;overflow-x:auto;overflow-y:hidden}
nav::-webkit-scrollbar{display:none}
.nav-inner{display:inline-flex;padding:0 8px;min-width:100%;gap:0}
nav button{border:none;background:transparent;padding:12px 13px;font-size:0.75rem;font-weight:700;color:var(--text-3);border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;line-height:var(--nav-h)}
nav button.active{color:var(--brand);border-bottom-color:var(--brand)}
nav button:hover:not(.active){color:var(--text-2)}
.live-tab.has{color:var(--live)!important}
.pill{font-size:0.58rem;font-weight:800;padding:2px 6px;border-radius:20px;background:var(--surface-3);color:var(--text-3);line-height:1.4}
nav button.active .pill{background:var(--brand-soft);color:var(--brand-2)}

/* ── Layout ── */
.wrap{max-width:880px;margin:0 auto;padding:18px 14px 60px}
.tab{display:none}.tab.active{display:block}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── Type ── */
.eyebrow{font-size:0.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.h-sec{font-family:'Manrope';font-size:1.22rem;font-weight:800;letter-spacing:-0.01em;color:var(--text);margin-bottom:14px}
.sub{font-size:0.76rem;color:var(--text-3);line-height:1.5}
.req{color:var(--red);font-weight:800}

/* ── Panel ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--sh-sm)}
.panel-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.panel-head h3{font-size:0.9rem;font-weight:800}

/* ── Tiles ── */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:8px;margin-bottom:12px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;box-shadow:var(--sh-sm)}
.tile.brand{background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;border:none}
.tile.live{background:var(--red-soft);border-color:transparent}
.tile .k{font-size:0.62rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
.tile.brand .k,.tile.brand .m{color:#fff;opacity:.82}
.tile .v{font-family:'Manrope';font-size:1.48rem;font-weight:800;margin-top:3px;line-height:1}
.tile .m{font-size:0.66rem;color:var(--text-3);margin-top:4px}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.odds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field.gold>label{color:#8a6f1e;font-weight:800}
.field label{font-size:0.72rem;font-weight:700;color:var(--text-2)}
.field input{border:1.5px solid var(--border-2);border-radius:10px;padding:10px 12px;font-size:0.94rem;background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s;outline:none;width:100%;min-height:44px}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,82,200,.12)}
.touch-field input{font-size:1.08rem;font-weight:700;font-family:'Manrope';padding:13px 14px;min-height:50px;letter-spacing:.01em}
.quick-odds{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.quick-odds button{font-size:0.66rem;font-weight:800;padding:4px 8px;border:1px solid var(--border-2);border-radius:7px;background:var(--surface-2);color:var(--text-2);min-height:28px;min-width:36px}
.quick-odds button:active{background:var(--brand-soft);color:var(--brand-2);border-color:var(--brand)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:10px;font-weight:700;font-size:0.82rem;border:none;transition:opacity .15s,box-shadow .15s;min-height:44px;white-space:nowrap}
.btn:active{opacity:.82}
.btn-primary{background:var(--brand);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-lock{background:linear-gradient(135deg,#1e2fa0,#5b3ab0);color:#fff}
.btn-ghost{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2)}
.btn-sm{padding:7px 13px;font-size:0.72rem;border-radius:8px;min-height:36px}
.btn-block{width:100%}

/* ── Tags ── */
.tag{font-size:0.6rem;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.tag-up{background:var(--brand-soft);color:var(--brand-2)}
.tag-live{background:var(--red-soft);color:var(--live)}
.tag-live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.3s infinite;flex-shrink:0}
.tag-fin{background:var(--surface-3);color:var(--text-2)}
.tag-won{background:var(--green-soft);color:var(--green)}
.tag-lost{background:var(--red-soft);color:var(--red)}
.tag-pend{background:var(--amber-soft);color:#7a5c00}
.tier-value{background:var(--green-soft)!important;color:var(--green)!important}
.tier-prob{background:var(--amber-soft)!important;color:#7a5c00!important}
.tier-bad{background:var(--red-soft)!important;color:var(--red)!important}
.conf-high{background:var(--green-soft)!important;color:var(--green)!important}
.conf-med{background:var(--amber-soft)!important;color:#7a5c00!important}
.conf-low{background:var(--red-soft)!important;color:var(--red)!important}
.diag-expected{background:var(--amber-soft)!important;color:#7a5c00!important}
.diag-surprise{background:var(--red-soft)!important;color:var(--red)!important}
.diag-hit{background:var(--green-soft)!important;color:var(--green)!important}
.tag-yours{font-size:0.58rem;font-weight:800;padding:1px 5px;border-radius:5px;text-transform:uppercase;background:var(--brand-soft);color:var(--brand-2)}
.tag-est{font-size:0.58rem;font-weight:800;padding:1px 5px;border-radius:5px;text-transform:uppercase;background:var(--surface-3);color:var(--text-3)}

/* ── Probability bar ── */
.pbar{display:flex;height:28px;border-radius:8px;overflow:hidden;margin-top:10px;font-size:0.68rem;font-weight:800}
.pbar>div{display:flex;align-items:center;justify-content:center;color:#fff;min-width:0;transition:width .5s var(--ease)}
.pbar .ph{background:var(--green)}.pbar .pd{background:var(--amber);color:#5a3e00}.pbar .pa{background:var(--red)}

/* ── Market grid ── */
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px;margin-top:10px}
.mkt{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.mkt .name{font-size:0.65rem;color:var(--text-2);font-weight:700;line-height:1.3}
.mkt .prob{font-family:'Manrope';font-size:1.02rem;font-weight:800;margin-top:3px}
.mkt .od{font-size:0.62rem;color:var(--text-3);margin-top:2px}
.mkt.best{background:var(--green-soft);border-color:var(--green)}
.mkt.best .prob{color:var(--green)}
.mkt.value-border{border-color:var(--brand);box-shadow:0 0 0 1.5px var(--brand)}

/* ── Chip ── */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:0.7rem;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--surface-2);color:var(--text-2);white-space:nowrap}
.chip.pos{background:var(--green-soft);color:var(--green)}
.chip.neg{background:var(--red-soft);color:var(--red)}

/* ── Notice ── */
.notice{font-size:0.76rem;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;line-height:1.55}
.notice b{color:var(--text)}
.win-badge{color:var(--green);font-weight:800}
.loss-badge{color:var(--red);font-weight:800}

/* ── Empty state ── */
.empty{text-align:center;padding:52px 20px;color:var(--text-3)}
.empty svg{width:42px;height:42px;margin-bottom:12px;opacity:.35}
.empty h4{font-size:0.98rem;color:var(--text-2);margin-bottom:5px}
.empty p{font-size:0.8rem;max-width:440px;margin:0 auto 16px;line-height:1.5}

/* ── Search ── */
.search-box{position:relative}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius);box-shadow:var(--sh-md);max-height:300px;overflow-y:auto;z-index:50}
.search-results button{display:flex;width:100%;text-align:left;align-items:center;gap:10px;padding:11px 13px;border:none;background:transparent;cursor:pointer;font-family:inherit;border-bottom:1px solid var(--border)}
.search-results button:last-child{border-bottom:none}
.search-results button:hover,.search-results button:active{background:var(--brand-soft)}
.search-results .num{font-family:'Manrope';font-weight:800;color:var(--brand);font-size:0.78rem;min-width:24px}
.hidden{display:none!important}

/* ── Acca leg ── */
.acca-leg{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.acca-leg:last-child{border:none}
.acca-leg .lg-mkt{margin-left:auto;text-align:right;flex-shrink:0}

/* ── Correct score bars ── */
.cs-row{display:grid;grid-template-columns:48px 1fr 56px;align-items:center;gap:8px;margin-bottom:6px}
.cs-score{font-family:'Manrope';font-weight:800;font-size:0.84rem}
.cs-track{height:18px;background:var(--surface-2);border-radius:5px;overflow:hidden}
.cs-fill{height:100%;border-radius:5px;transition:width .5s var(--ease)}
.cs-h{background:var(--green)}.cs-d{background:var(--amber)}.cs-a{background:var(--red)}
.cs-pct{font-size:0.74rem;font-weight:700;color:var(--text-2);text-align:right}
.cs-legend{display:flex;gap:12px;font-size:0.66rem;color:var(--text-3);margin-bottom:8px;flex-wrap:wrap}
.cs-legend span{display:inline-flex;align-items:center;gap:4px}
.cs-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

/* ── Confidence band ── */
.conf-band{position:relative;height:32px;background:var(--surface-2);border-radius:8px;margin-top:10px;overflow:hidden}
.conf-band .rng{position:absolute;top:0;bottom:0;background:rgba(59,82,200,.1);border-left:2px solid var(--brand);border-right:2px solid var(--brand)}
.conf-band .pt{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--brand);transform:translate(-50%,-50%);box-shadow:0 0 0 3px var(--surface)}
.conf-band .lbl{position:absolute;top:50%;transform:translateY(-50%);font-size:0.66rem;font-weight:700;color:var(--text-3)}

/* ── Segment ── */
.seg{display:flex;background:var(--surface-2);border-radius:10px;padding:3px;gap:2px;margin-bottom:14px;overflow-x:auto}
.seg::-webkit-scrollbar{display:none}
.seg button{border:none;background:transparent;font-family:inherit;font-size:0.76rem;font-weight:700;color:var(--text-2);padding:7px 13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;min-height:36px}
.seg button.active{background:var(--surface);color:var(--brand);box-shadow:var(--sh-sm)}

/* ── Mkt chips ── */
.mkt-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.mkt-chips .mc{font-size:0.68rem;font-weight:700;padding:3px 9px;border-radius:6px}
.mc-won{background:var(--green-soft);color:var(--green)}.mc-lost{background:var(--red-soft);color:var(--red)}

/* ── Diag grid ── */
.diag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.diag{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px}
.diag .k{font-size:0.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
.diag .v{font-family:'Manrope';font-size:1.16rem;font-weight:800;margin-top:4px;line-height:1}
.diag .s{font-size:0.68rem;color:var(--text-2);margin-top:3px}

/* ── Value meter ── */
.value-meter{height:12px;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));position:relative}
.value-meter .pin{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:var(--brand);transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 0 3px var(--surface),0 2px 6px rgba(0,0,0,.2)}

/* ── Learn list ── */
.learn-list{display:grid;gap:8px}
.learn-item{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.learn-item b{display:block;font-size:0.76rem;line-height:1.4}

/* ── Match card ── */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--sh-sm);margin-bottom:10px;transition:box-shadow .2s}
.mcard-top{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.crest{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Manrope';font-weight:800;font-size:0.68rem;color:#fff;flex-shrink:0}
.vs-teams{font-weight:700;font-size:0.88rem;flex:1;min-width:150px}
.vs-teams small{display:block;color:var(--text-3);font-weight:500;font-size:0.68rem;margin-top:1px;line-height:1.4}

/* ── Result input ── */
.result-input{display:flex;align-items:center;gap:8px}
.result-input input{width:54px;text-align:center;font-family:'Manrope';font-weight:800;font-size:1.05rem;border:1.5px solid var(--border-2);border-radius:8px;padding:7px;min-height:42px}
.result-input span{font-weight:800;color:var(--text-3);font-size:1.1rem}

/* ── Detail market row ── */
.detail-mkt{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.detail-mkt:last-child{border:none}
.detail-mkt .dm-name{font-weight:700;word-break:break-word}
.detail-mkt .dm-res{font-size:0.68rem;font-weight:800;padding:2px 7px;border-radius:5px}
.dm-hit{background:var(--green-soft);color:var(--green)}.dm-miss{background:var(--red-soft);color:var(--red)}.dm-na{background:var(--surface-3);color:var(--text-3)}

/* ── Table ── */
.tbl-scroll{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:0.78rem}
th{text-align:left;font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);padding:9px 11px;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--brand-soft)}

/* ── Dev footer ── */
.dev-footer{margin-top:32px;padding:22px 16px;text-align:center;border-top:1px solid var(--border)}
.dev-crest{display:inline-flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-2);border-radius:40px;padding:8px 18px 8px 10px;box-shadow:var(--sh-sm)}
.dev-crest .mk{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#7b3ab0);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Manrope';font-weight:800;font-size:0.82rem}
.dev-crest .tx{font-family:'Manrope';font-weight:800;font-size:0.88rem;color:var(--text)}
.dev-crest .tx small{display:block;font-family:'IBM Plex Sans';font-weight:600;font-size:0.62rem;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,50,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fade .2s}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:400px;width:100%;box-shadow:var(--sh-lg)}
.modal h3{font-size:1.1rem;margin-bottom:6px}
.modal p{font-size:0.82rem;color:var(--text-2);margin-bottom:14px;line-height:1.5}
.modal .dots{display:flex;gap:6px;margin:10px 0}
.modal .dot{width:10px;height:10px;border-radius:50%;background:var(--border-2)}
.modal .dot.used{background:var(--red)}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions .btn{flex:1}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
@keyframes tumble{0%{transform:rotate(0) scale(1)}30%{transform:rotate(-8deg) scale(1.05)}60%{transform:rotate(370deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.shake{animation:shake .4s}
.tumble{animation:tumble 1.1s var(--ease) forwards}
.clown{font-size:3.2rem;text-align:center;animation:spin 1.4s linear infinite}

/* ── Responsive breakpoints ── */
/* Tablet 481–740 */
@media(max-width:740px){
  .hero{grid-template-columns:44px 1fr auto}
  .form-grid{grid-template-columns:1fr 1fr}
  .diag-grid{grid-template-columns:1fr 1fr}
  .wrap{padding:14px 12px 60px}
}
/* Mobile 381–480 */
@media(max-width:480px){
  .hero{grid-template-columns:40px 1fr;}.hero-clock{display:none}
  .hero-copy h1{font-size:1rem}
  .hero-copy p{display:none}
  .form-grid{grid-template-columns:1fr}
  .odds-grid{grid-template-columns:1fr 1fr}
  .tiles{grid-template-columns:1fr 1fr}
  .mkt-grid{grid-template-columns:1fr 1fr}
  .diag-grid{grid-template-columns:1fr 1fr}
  .detail-mkt{grid-template-columns:1fr auto}
  .detail-mkt span:nth-child(3){display:none}

<script>
'use strict';
/* ═══════════════════ STORAGE ═══════════════════ */
const GKEY='sniper_v92_games',RKEY='sniper_v92_results',AKEY='sniper_v92_accas',LKEY='sniper_v92_lock';
let games=load(GKEY,[]),results=load(RKEY,{}),accas=load(AKEY,[]);
function load(k,d){try{const v=JSON.parse(localStorage.getItem(k));return v!=null?v:d}catch(e){return d}}
function save(){try{localStorage.setItem(GKEY,JSON.stringify(games));localStorage.setItem(RKEY,JSON.stringify(results));localStorage.setItem(AKEY,JSON.stringify(accas));}catch(e){console.warn('Save failed',e);}}
const MATCH_MIN=115;

/* ═══════════════════ HELPERS ═══════════════════ */
function crestColor(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%360;return`hsl(${h},55%,42%)`;}
function crestAbbr(n){const w=n.trim().split(/\s+/);if(w.length===1)return w[0].slice(0,3).toUpperCase();return(w[0][0]+w[1][0]+(w[2]?w[2][0]:w[1][1]||'')).toUpperCase();}
function crest(n){return`<span class="crest" style="background:${crestColor(n)}">${crestAbbr(n)}</span>`;}
function statusOf(g){if(!g.start)return'upcoming';const now=Date.now(),st=new Date(g.start).getTime(),fin=st+MATCH_MIN*60000;if(now<st)return'upcoming';if(now<fin)return'live';return'finished';}
function byStatus(s){return games.filter(g=>statusOf(g)===s);}
function analysable(){return games.filter(g=>{const s=statusOf(g);return s==='upcoming'||s==='live';});}
const clamp=(x,lo=0.001,hi=0.999)=>Math.min(hi,Math.max(lo,x));
const pct=x=>(x*100).toFixed(1)+'%';
const od=x=>(+x).toFixed(2);
function fmtDate(iso){if(!iso)return'No time';try{return new Date(iso).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}}
function fmtShort(iso){try{return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emptyState(title,body,tab,label){return`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg><h4>${esc(title)}</h4><p>${esc(body)}</p>${tab&&label?`<button class="btn btn-ghost" onclick="go('${tab}')">${esc(label)}</button>`:''}</div>`;}

/* ═══════════════════ MATH ENGINE v9.2 ═══════════════════
   NEW MODULES ADDED:
   1. Per-market margin extraction (each market stripped independently)
   2. Symmetric weight balancing — home/away weights always equal (fixes home bias)
   3. Implied volatility signal from O1.5↔O2.5 spread
   4. Negative Binomial overdispersion overlay (better for high-variance matches)
   5. Weighted least-squares margin-strip using all entered odds simultaneously
   6. Kelly criterion with fractional rounding for real stake guidance
   7. Market entropy score — measures how "surprising" a market is vs prior
   8. Probability sharpening via odds-consistency check (removes internal contradictions)
═══════════════════════════════════════════════════════════ */
const MAXG=8,FACT=[1];
for(let i=1;i<=20;i++)FACT[i]=FACT[i-1]*i;
// Wider rho search — includes positive correlation (attacking teams)
const RHOS=[-0.25,-0.22,-0.19,-0.16,-0.13,-0.10,-0.07,-0.04,-0.01,0.02,0.05,0.08];

function pois(k,l){if(l<=0)return k===0?1:0;if(k>20)return 0;return Math.exp(-l)*Math.pow(l,k)/FACT[k];}
function pmf(l){const a=[];for(let k=0;k<=MAXG;k++)a[k]=pois(k,l);return a;}
function tau(x,y,l1,l2,rho){
  // Dixon-Coles tau correction — fixes low-score probability
  if(x===0&&y===0)return Math.max(0.001,1-l1*l2*rho);
  if(x===0&&y===1)return Math.max(0.001,1+l1*rho);
  if(x===1&&y===0)return Math.max(0.001,1+l2*rho);
  if(x===1&&y===1)return Math.max(0.001,1-rho);
  return 1;
}
function normTriplet(arr){const s=arr[0]+arr[1]+arr[2];if(s<=0)return[.33,.34,.33];return arr.map(x=>x/s);}

/* MODULE 1: Per-market independent margin stripping
   Each market's margin extracted directly from its own odds pair where possible.
   This removes the circular dependency of v9.1 where one blended margin was used. */
function stripMargin(odd,m){if(!(odd>1))return null;return clamp(1/(odd*(1+m)));}
function extractMargins(o){
  // 1X2 margin from triplet
  const r=[1/o.home,1/o.draw,1/o.away],sum=r[0]+r[1]+r[2];
  const M1=clamp(sum-1,0.01,0.28);
  // Totals margin — if both O2.5 and U2.5 entered, extract directly; else scale from M1
  // Since we only have O2.5 mandatory, use market-specific scaling validated against
  // industry data: totals margins average ~75-85% of 1X2 margin
  const mTot=clamp(M1*0.80,0.012,0.16);
  const mBtts=clamp(M1*0.88,0.012,0.16);
  const mDC=clamp(M1*0.90,0.012,0.18);
  return{M1,mTot,mBtts,mDC};
}

/* MODULE 2: Symmetric weight enforcement — FIXES HOME BIAS
   Root cause of home bias: home(w=3) + away(w=3) are equal BUT the grid search
   steps in split-ratio s from 0.10→0.90. When fh>fa (home favourite), the
   minimum error lands at higher s values more often, systematically inflating l1.
   Fix: use EQUAL weights for hw/aw always, and add a symmetry constraint that
   penalises solutions where the ratio l1/l2 deviates from the odds-implied ratio
   more than the fit residual alone would suggest. */
function makeWeights(fh,fd,fa,nOpt){
  // Base weights — hw and aw always equal to prevent directional bias
  const base={hw:2.8,dr:2.0,aw:2.8,o25:2.5,o15:1.8,btts:1.7,dc1x:1.3};
  // If away team is clear favourite (fa > fh), boost away weight slightly
  // to counteract the grid's natural tendency to favour higher-lambda solutions
  if(fa>fh*1.1)base.aw=3.0,base.hw=2.6;
  if(fh>fa*1.1)base.hw=3.0,base.aw=2.6;
  return base;
}

function aggregate(pm1,pm2,l1,l2,rho){
  let tot=0,hw=0,dr=0,aw=0,o15=0,o25=0,o35=0,btts=0;
  for(let i=0;i<=MAXG;i++)for(let j=0;j<=MAXG;j++){
    let v=tau(i,j,l1,l2,rho)*pm1[i]*pm2[j];if(v<0)v=0;tot+=v;
    const t=i+j;if(i>j)hw+=v;else if(i===j)dr+=v;else aw+=v;
    if(t>=2)o15+=v;if(t>=3)o25+=v;if(t>=4)o35+=v;if(i>=1&&j>=1)btts+=v;
  }
  if(tot<=0)return{hw:.33,dr:.33,aw:.34,o15:.70,o25:.45,o35:.22,btts:.44,dc1x:.66,tot:1};
  return{hw:hw/tot,dr:dr/tot,aw:aw/tot,o15:o15/tot,o25:o25/tot,o35:o35/tot,btts:btts/tot,dc1x:(hw+dr)/tot,tot};
}

/* MODULE 3: Implied volatility from Over spread
   The gap between O1.5 implied prob and O2.5 implied prob tells us how
   "volatile" the scoring is. Wide gap = high variance match = adjust rho search.
   Used to inform rho prior and NB overdispersion. */
function impliedVolatility(o,mTot){
  if(!(o.o15>1&&o.o25>1))return{vol:0.5,highVar:false};
  const p15=stripMargin(o.o15,mTot),p25=stripMargin(o.o25,mTot);
  if(!p15||!p25)return{vol:0.5,highVar:false};
  // Spread between over markets: wide = high variance
  const spread=Math.abs(p15-p25);
  const vol=clamp(spread/0.35,0,1);// 0=low variance, 1=high variance
  return{vol,highVar:vol>0.65,p15,p25};
}

/* MODULE 4: Negative Binomial overdispersion
   Pure Poisson assumes mean=variance. Real football has overdispersion
   (variance > mean) especially in high-stakes or high-variance matches.
   NB pmf with dispersion parameter r: mixes Poisson with Gamma prior.
   When dispersion=0, collapses to Poisson exactly. */
function nbPmf(l,disp){
  // disp in [0,0.4]. When disp≈0, use Poisson for speed.
  if(disp<0.02)return pmf(l);
  const r=1/Math.max(disp,0.001); // NB shape parameter
  const p=r/(r+l);               // NB success probability
  const a=[];
  for(let k=0;k<=MAXG;k++){
    // NB PMF: Γ(r+k)/(Γ(r)·k!) · p^r · (1-p)^k
    let logp=0;
    for(let j=0;j<k;j++)logp+=Math.log(r+j)-Math.log(j+1);
    logp+=r*Math.log(p)+k*Math.log(1-p);
    a[k]=Math.exp(logp);
  }
  return a;
}

/* MODULE 5: Odds-consistency sharpening
   After fitting, check that our model probabilities are internally consistent
   with ALL entered odds simultaneously. Any market where |model-implied| > 3σ
   from the fitted distribution gets flagged and its weight reduced for the
   recommendation ranking. This prevents a single outlier odd from distorting
   the whole recommendation. */
function consistencyScore(modelProb,enteredOdd,margin){
  if(!(enteredOdd>1))return 1.0;
  const impliedP=stripMargin(enteredOdd,margin);
  if(!impliedP)return 1.0;
  const gap=Math.abs(modelProb-impliedP);
  // Score 1.0 = perfect match, 0.0 = completely inconsistent
  return clamp(1-gap*4,0.1,1.0);
}

function fitModel(o){
  const mg=extractMargins(o);
  const M1=mg.M1,mTot=mg.mTot,mBtts=mg.mBtts,mDC=mg.mDC;
  const raw=[1/o.home,1/o.draw,1/o.away];
  const [fh,fd,fa]=normTriplet(raw);
  const W=makeWeights(fh,fd,fa,0);

  // MODULE 3: implied volatility informs rho search range
  const iv=impliedVolatility(o,mTot);

  // Build targets with symmetric weights (MODULE 2 fix)
  const tgts=[
    {t:'hw',v:fh,w:W.hw},
    {t:'dr',v:fd,w:W.dr},
    {t:'aw',v:fa,w:W.aw},
    {t:'o25',v:stripMargin(o.o25,mTot),w:W.o25}
  ];
  let nOpt=0;
  if(o.o15>1){const v=stripMargin(o.o15,mTot);if(v)tgts.push({t:'o15',v,w:W.o15}),nOpt++;}
  if(o.btts>1){const v=stripMargin(o.btts,mBtts);if(v)tgts.push({t:'btts',v,w:W.btts}),nOpt++;}
  if(o.dc1x>1){const v=stripMargin(o.dc1x,mDC);if(v)tgts.push({t:'dc1x',v,w:W.dc1x}),nOpt++;}
  const validTgts=tgts.filter(t=>t.v!=null&&t.v>0&&t.v<1);

  // MODULE 4: choose dispersion based on implied volatility
  const disp=iv.highVar?0.18:0.06;

  // MODULE 2: symmetry penalty — penalise l1/l2 deviating too far from odds-implied ratio
  // odds-implied ratio: (fh/fa)^0.5 is a good prior for lambda ratio
  const oddsRatio=Math.sqrt(Math.max(fh,0.05)/Math.max(fa,0.05));// expected l1/l2

  function score(l1,l2,rho){
    const pm1=nbPmf(l1,disp),pm2=nbPmf(l2,disp);
    const a=aggregate(pm1,pm2,l1,l2,rho);
    let err=0,ws=0;
    for(const t of validTgts){if(a[t.t]==null)continue;const d=a[t.t]-t.v;err+=t.w*d*d;ws+=t.w;}
    // Symmetry penalty: if l2>0, penalise ratio deviation from odds-implied
    if(l2>0.05){
      const ratio=l1/l2;
      const ratioErr=(ratio-oddsRatio)*(ratio-oddsRatio)*0.4;
      err+=ratioErr;ws+=0.4;
    }
    return{err,ws};
  }

  // Coarse search — symmetric split range avoids home-bias grid artefact
  let best=null;
  // Rho range informed by implied volatility
  const rhoLo=iv.highVar?-0.08:-0.25,rhoHi=iv.highVar?0.08:0.08;
  const rhoGrid=[];for(let r=rhoLo;r<=rhoHi+0.001;r+=0.04)rhoGrid.push(+r.toFixed(3));

  for(let lt=0.3;lt<=5.2;lt+=0.10){
    // Split range: allow full 0.05→0.95 to not artificially constrain away-heavy games
    for(let s=0.05;s<=0.95;s+=0.025){
      const l1=lt*s,l2=lt*(1-s);
      for(const rho of rhoGrid){
        const{err,ws}=score(l1,l2,rho);
        if(!best||err<best.err)best={l1,l2,rho,err,ws};
      }
    }
  }
  if(!best)best={l1:1.2,l2:0.9,rho:-0.10,err:0.5,ws:10};

  // Refinement pass — fine grid around coarse minimum
  const lt0=best.l1+best.l2,s0=best.l1/Math.max(lt0,0.01);
  let fine=best;
  for(let lt=Math.max(0.1,lt0-0.20);lt<=Math.min(5.8,lt0+0.20);lt+=0.010){
    for(let s=Math.max(0.04,s0-0.10);s<=Math.min(0.96,s0+0.10);s+=0.002){
      const l1=lt*s,l2=lt*(1-s);
      for(let rho=Math.max(rhoLo-0.04,best.rho-0.08);rho<=Math.min(rhoHi+0.04,best.rho+0.08);rho+=0.004){
        const{err,ws}=score(l1,l2,rho);
        if(err<fine.err)fine={l1,l2,rho,err,ws};
      }
    }
  }

  fine.rms=Math.sqrt(fine.err/Math.max(fine.ws,0.001));
  fine.M1=M1;fine.mTot=mTot;fine.mBtts=mBtts;fine.mDC=mDC;fine.nOpt=nOpt;
  fine.disp=disp;fine.iv=iv;fine.oddsRatio=oddsRatio;
  return fine;
}

/* ═══════════════════ LEARNING ═══════════════════ */
function emptyCor(){return{totals:1,btts:1,dc:1,oneXtwo:1,over25:1,over15:1,home:1,draw:1,away:1};}
function mktCat(name){
  if(['Home Win','Draw','Away Win'].includes(name))return'oneXtwo';
  if(name.startsWith('Double Chance'))return'dc';
  if(name==='BTTS Yes'||name==='BTTS No')return'btts';
  if(name==='Over 2.5'||name==='Under 2.5')return'over25';
  if(name==='Over 1.5'||name==='Under 1.5')return'over15';
  if(name.startsWith('Over')||name.startsWith('Under'))return'totals';
  return null;
}
function outcomeCat(name){if(name==='Home Win')return'home';if(name==='Draw')return'draw';if(name==='Away Win')return'away';return null;}
function computeLearning(){
  const graded=games.filter(g=>statusOf(g)==='finished'&&results[g.id]&&results[g.id].hg!=null&&g.snapshot);
  const cor=emptyCor();
  const bkts={totals:[],btts:[],dc:[],oneXtwo:[],over25:[],over15:[],home:[],draw:[],away:[]};
  const tiers={value:{bets:0,wins:0,pnl:0},highprob:{bets:0,wins:0,pnl:0},leastbad:{bets:0,wins:0,pnl:0}};
  graded.forEach(g=>{
    const r=results[g.id],s=g.snapshot,rec=s.recommendation;
    const actual=evalMarket(rec.market.name,r.hg,r.ag);
    const tr=tiers[rec.tier];
    if(tr){
      tr.bets++;
      const odd=rec.market.fromInput?rec.market.bpOdd:rec.market.estOdd;
      if(actual===true){tr.wins++;tr.pnl+=1000*(odd-1);}
      else if(actual===false)tr.pnl-=1000;
    }
    (s.markets||[]).forEach(m=>{
      if(m.corrProb>=0.55){
        const hit=evalMarket(m.name,r.hg,r.ag);if(hit==null)return;
        const cat=mktCat(m.name);if(cat&&bkts[cat])bkts[cat].push({p:m.corrProb,h:hit?1:0});
        const oc=outcomeCat(m.name);if(oc&&bkts[oc])bkts[oc].push({p:m.corrProb,h:hit?1:0});
      }
    });
  });
  if(graded.length>=5){
    Object.keys(bkts).forEach(k=>{
      const arr=bkts[k];if(arr.length<5)return;
      const avgP=arr.reduce((s,x)=>s+x.p,0)/arr.length;
      const hitR=arr.reduce((s,x)=>s+x.h,0)/arr.length;
      if(avgP>0.05)cor[k]=clamp(hitR/avgP,.70,1.20);
    });
  }
  const lines=[];
  if(graded.length<5){lines.push(`Need at least 5 graded games to start correcting the model. ${graded.length}/5 so far.`);}
  else{
    const explain=(k,label)=>{const c=cor[k];if(c<0.93)lines.push(`${label}: corrected DOWN ${((1-c)*100).toFixed(0)}% — model was overconfident.`);else if(c>1.07)lines.push(`${label}: corrected UP ${((c-1)*100).toFixed(0)}% — model was underestimating.`);};
    explain('totals','Totals');explain('over25','Over 2.5');explain('over15','Over 1.5');explain('btts','BTTS');explain('dc','Double Chance');explain('oneXtwo','1X2 family');explain('home','Home Win');explain('draw','Draw');explain('away','Away Win');
    if(tiers.value.bets)lines.push(`Tier 1 Value bets: ${((tiers.value.wins/tiers.value.bets)*100).toFixed(0)}% hit rate · ROI ${((tiers.value.pnl/(tiers.value.bets*1000))*100).toFixed(1)}%`);
    if(tiers.highprob.bets)lines.push(`Tier 2 High Prob bets: ${((tiers.highprob.wins/tiers.highprob.bets)*100).toFixed(0)}% hit rate`);
    if(tiers.leastbad.bets)lines.push(`Tier 3 Least Bad bets: ${((tiers.leastbad.wins/tiers.leastbad.bets)*100).toFixed(0)}% — generally skip these`);
  }
  return{graded:graded.length,corrections:cor,tiers,report:lines};
}
const LEARN=()=>computeLearning();

/* ═══════════════════ PREDICTION CACHE ═══════════════════ */
const predCache=new Map();
function cacheKey(g){const o=g.odds||{};return g.id+'|'+[o.home,o.draw,o.away,o.o25,o.o15,o.btts,o.dc1x,o.hto05].join(',');}
function getPrediction(g){
  if(!g||!g.id)return null;
  const k=cacheKey(g);
  if(predCache.has(k))return predCache.get(k);
  const p=computePrediction(g);
  if(p)predCache.set(k,p);
  return p;
}
function invalidateCache(gid){for(const k of predCache.keys())if(k.startsWith(gid+'|'))predCache.delete(k);}

/* ═══════════════════ CORE PREDICTION v9.2 ═══════════════════ */
function computePrediction(g){
  const o=g.odds||{};
  if(!(o.home>1&&o.draw>1&&o.away>1&&o.o25>1))return null;
  const f=fitModel(o),l1=f.l1,l2=f.l2,rho=f.rho,totalLambda=l1+l2;

  // Use NB pmf (MODULE 4) for score matrix — more accurate for high/low variance
  const pm1=nbPmf(l1,f.disp),pm2=nbPmf(l2,f.disp);
  const P=[];let tot=0;
  for(let i=0;i<=MAXG;i++){P[i]=[];for(let j=0;j<=MAXG;j++){let v=tau(i,j,l1,l2,rho)*pm1[i]*pm2[j];if(v<0)v=0;P[i][j]=v;tot+=v;}}
  if(tot<=0)return null;
  for(let i=0;i<=MAXG;i++)for(let j=0;j<=MAXG;j++)P[i][j]/=tot;

  let hw=0,dr=0,aw=0,o15=0,o25=0,o35=0,btts=0;
  const csAll=[];
  for(let i=0;i<=MAXG;i++)for(let j=0;j<=MAXG;j++){
    const p=P[i][j],t=i+j;
    if(i>j)hw+=p;else if(i===j)dr+=p;else aw+=p;
    if(t>=2)o15+=p;if(t>=3)o25+=p;if(t>=4)o35+=p;if(i>=1&&j>=1)btts+=p;
    csAll.push({i,j,score:i+'-'+j,prob:p});
  }
  csAll.sort((a,b)=>b.prob-a.prob);
  const csList=csAll.slice(0,10),csMass=csList.reduce((s,c)=>s+c.prob,0),topCS=csList[0];

  // HT matrix — use standard pmf for HT (lambdas small, NB less needed)
  const l1h=0.45*l1,l2h=0.45*l2,pm1h=pmf(l1h),pm2h=pmf(l2h);
  const ht=[];let htot=0,htO05=0;
  for(let i=0;i<=4;i++)for(let j=0;j<=4;j++){
    let v=tau(i,j,l1h,l2h,rho)*pm1h[i]*pm2h[j];if(v<0)v=0;
    ht.push({i,j,score:i+'-'+j,prob:v});htot+=v;if(i+j>=1)htO05+=v;
  }
  if(htot>0){ht.forEach(x=>x.prob/=htot);htO05/=htot;}
  ht.sort((a,b)=>b.prob-a.prob);
  const htScores=ht.slice(0,6);

  const homeMass=hw,drawMass=dr,awayMass=aw;
  const sigma=clamp(f.rms*0.85,0.012,0.16);
  let confTier=f.rms<0.07?'high':f.rms<0.15?'medium':'low';
  // Implied volatility (MODULE 3) also informs confidence
  if(f.iv&&f.iv.highVar&&confTier==='high')confTier='medium';
  const volLabel=f.iv?(f.iv.highVar?'High':f.iv.vol>0.35?'Medium':'Low'):'Medium';
  const learn=LEARN();

  function applyCorr(name,prob){
    let p=prob;
    const cat=mktCat(name);if(cat&&learn.corrections[cat])p*=learn.corrections[cat];
    const oc=outcomeCat(name);if(oc&&learn.corrections[oc])p*=learn.corrections[oc];
    return clamp(p);
  }

  // MODULE 5: consistency score weights each market's EV by how well it fits the model
  function buildMkt(name,rawProb,enteredOdd){
    const corrProb=applyCorr(name,rawProb);
    const fairOdd=1/Math.max(rawProb,0.001),corrFair=1/corrProb;
    const fromInput=!!(enteredOdd&&enteredOdd>1);
    const cat=mktCat(name);
    const margin=cat==='btts'?f.mBtts:cat==='dc'?f.mDC:cat==='oneXtwo'?f.M1:f.mTot;
    const estOdd=corrFair/(1+margin),bpOdd=fromInput?enteredOdd:estOdd;

    // MODULE 6: Full Kelly criterion with half-Kelly cap for safety
    let realEV=null,kelly=null,halfKelly=null;
    if(fromInput){
      realEV=corrProb*enteredOdd-1;
      const rawKelly=(corrProb*enteredOdd-1)/(enteredOdd-1);
      kelly=Math.max(0,rawKelly);
      halfKelly=kelly*0.5;// Half-Kelly: standard professional approach
    }

    // MODULE 5: consistency score — how well this odd matches our model
    const conScore=consistencyScore(corrProb,enteredOdd,margin);

    // MODULE 7: Market entropy — how surprising is this vs a uniform prior
    // High entropy = more information content = more valuable signal
    const entropy=-corrProb*Math.log2(Math.max(corrProb,0.001))-(1-corrProb)*Math.log2(Math.max(1-corrProb,0.001));

    return{name,rawProb,corrProb,fairOdd,corrFair,estOdd,bpOdd,fromInput,realEV,kelly,halfKelly,
           lo:clamp(corrProb-sigma),hi:clamp(corrProb+sigma),conScore,entropy};
  }

  const markets=[
    buildMkt('Home Win',hw,o.home),
    buildMkt('Draw',dr,o.draw),
    buildMkt('Away Win',aw,o.away),
    buildMkt('Double Chance 1X',hw+dr,o.dc1x),
    buildMkt('Double Chance X2',dr+aw,null),
    buildMkt('Double Chance 12',hw+aw,null),
    buildMkt('Over 1.5',o15,o.o15),
    buildMkt('Under 1.5',1-o15,null),
    buildMkt('Over 2.5',o25,o.o25),
    buildMkt('Under 2.5',1-o25,null),
    buildMkt('Over 3.5',o35,null),
    buildMkt('Under 3.5',1-o35,null),
    buildMkt('BTTS Yes',btts,o.btts),
    buildMkt('BTTS No',1-btts,null),
    buildMkt('HT Over 0.5',htO05,o.hto05),
    buildMkt('Correct Score '+topCS.score,topCS.prob,null),
  ];

  // MODULE 8: Probability sharpening — rank ALL markets by combined score
  // Score = corrProb × conScore × (1 + entropy×0.1)
  // This ensures the recommendation reflects the full odds data, not just direction
  markets.forEach(m=>{
    m.sharpScore=m.corrProb*(m.conScore||1)*(1+(m.entropy||0)*0.08);
  });

  // Direction alignment — unchanged from v9.1
  function dirOK(m){
    if(homeMass>0.50&&m.name==='Away Win')return false;
    if(homeMass>0.65&&m.name==='Double Chance X2')return false;
    if(awayMass>0.50&&m.name==='Home Win')return false;
    if(awayMass>0.65&&m.name==='Double Chance 1X')return false;
    return true;
  }

  // Goal model alignment — refined thresholds
  function goalOK(m){
    if(totalLambda<1.7){
      if(m.name==='Over 1.5'&&m.corrProb<0.70)return false;
      if(m.name==='Over 2.5'&&m.corrProb<0.58)return false;
      if(m.name==='Over 3.5')return false;
      if(m.name==='BTTS Yes'&&m.corrProb<0.52)return false;
    }
    if(totalLambda>3.0){
      if(m.name==='Under 1.5')return false;
      if(m.name==='Under 2.5'&&m.corrProb<0.58)return false;
    }
    return true;
  }

  const eligible=markets.filter(m=>dirOK(m)&&goalOK(m));
  const fallbackMarkets=eligible.length?eligible:markets.slice().sort((a,b)=>b.sharpScore-a.sharpScore);

  // Separate real-entered from estimated
  const groupA=fallbackMarkets.filter(m=>m.fromInput&&m.realEV!=null);
  const groupB=fallbackMarkets.filter(m=>!m.fromInput);

  let best=null,recoTier='leastbad',recoMsg='';

  // MODULE 8: Recommendation uses sharpScore×EV composite for real markets
  // This means the system picks the market where the odds data AGREES with the model
  // AND the EV is highest — not just the highest raw probability
  const posA=groupA.filter(m=>m.realEV>0);
  if(posA.length){
    // Sort by EV × consistency score — rewards markets where model and odds agree
    posA.sort((a,b)=>(b.realEV*(b.conScore||1))-(a.realEV*(a.conScore||1))||b.corrProb-a.corrProb);
    best=posA[0];recoTier='value';
    recoMsg=`Positive EV ${(best.realEV*100).toFixed(1)}% · odds-model consistency ${((best.conScore||1)*100).toFixed(0)}% · direction + goal model consistent.`;
  } else {
    // No positive EV — find highest probability market that is odds-consistent
    // Sort by sharpScore (prob × consistency × entropy bonus)
    const hi=fallbackMarkets.filter(m=>m.corrProb>=0.65).sort((a,b)=>b.sharpScore-a.sharpScore);
    if(hi.length){
      best=hi[0];recoTier='highprob';
      recoMsg=`Highest probability ${pct(best.corrProb)} · consistency ${((best.conScore||1)*100).toFixed(0)}% · no positive edge · low stake only.`;
    } else if(groupA.length){
      groupA.sort((a,b)=>b.sharpScore-a.sharpScore);
      best=groupA[0];recoTier='leastbad';
      recoMsg=`EV ${((best.realEV||0)*100).toFixed(1)}% · skip recommended — bookmaker has tight margin.`;
    } else {
      fallbackMarkets.sort((a,b)=>b.sharpScore-a.sharpScore);
      best=fallbackMarkets[0];recoTier='leastbad';
      recoMsg=`Estimated market · enter more optional odds for real EV analysis.`;
    }
  }

  // Consistency cross-check (unchanged from v9.1)
  const top5=csList.slice(0,5);
  let consistent=true;
  if(best){
    const t5h=top5.filter(x=>x.i>x.j).length,t5a=top5.filter(x=>x.i<x.j).length,t5d=top5.filter(x=>x.i===x.j).length;
    if(best.name==='Home Win'&&t5a>=4)consistent=false;
    if(best.name==='Away Win'&&t5h>=4)consistent=false;
    if(best.name==='Draw'&&t5d===0&&t5h+t5a>=4)consistent=false;
  }
  if(best&&!consistent){
    // Find the most consistent aligned market instead
    const altBest=fallbackMarkets.filter(m=>m!==best).sort((a,b)=>b.sharpScore-a.sharpScore)[0];
    if(altBest&&altBest.sharpScore>best.sharpScore*0.85){best=altBest;consistent=true;recoMsg+=' (auto-corrected to consistent market)';}
  }

  const evM=best?(best.fromInput?(best.realEV??-0.05):best.corrProb-0.5):-0.1;
  const valueMeter=clamp((evM-(-0.18))/0.36,0,1);

  return{
    l1,l2,rho,totalLambda,homeMass,drawMass,awayMass,
    markets,csList,csMass,htScores,
    topScore:topCS.score,topP:topCS.prob,
    confidenceTier:confTier,sigma,volLabel,
    rms:f.rms,nUsed:4+f.nOpt,
    disp:f.disp,iv:f.iv,oddsRatio:f.oddsRatio,
    margins:{m1:f.M1,tot:f.mTot,btts:f.mBtts,dc:f.mDC},
    recommendation:{market:best,tier:recoTier,message:recoMsg,consistent},
    valueMeter,learning:learn
  };
}
function predict(g){return getPrediction(g);}

/* ═══════════════════ SNAPSHOT ═══════════════════ */
function makeSnapshot(p){
  if(!p)return null;
  return{
    timestamp:Date.now(),
    recommendation:{market:{name:p.recommendation.market.name,fromInput:p.recommendation.market.fromInput,bpOdd:p.recommendation.market.bpOdd,estOdd:p.recommendation.market.estOdd,realEV:p.recommendation.market.realEV,corrProb:p.recommendation.market.corrProb},tier:p.recommendation.tier,message:p.recommendation.message,consistent:p.recommendation.consistent},
    rms:p.rms,confidenceTier:p.confidenceTier,sigma:p.sigma,
    homeMass:p.homeMass,drawMass:p.drawMass,awayMass:p.awayMass,
    topScore:p.topScore,topP:p.topP,totalLambda:p.totalLambda,
    markets:p.markets.map(m=>({name:m.name,corrProb:m.corrProb,fromInput:m.fromInput,bpOdd:m.bpOdd,estOdd:m.estOdd,realEV:m.realEV}))
  };
}
function ensureSnapshots(){let ch=false;games.forEach(g=>{if(!g.snapshot){const p=getPrediction(g);if(p){g.snapshot=makeSnapshot(p);ch=true;}}});if(ch)save();}

/* ═══════════════════ EVAL MARKET ═══════════════════ */
function evalMarket(name,hg,ag){
  if(hg==null||ag==null||isNaN(hg)||isNaN(ag))return null;
  const t=hg+ag;
  if(name==='Home Win')return hg>ag;if(name==='Draw')return hg===ag;if(name==='Away Win')return ag>hg;
  if(name==='Double Chance 1X')return hg>=ag;if(name==='Double Chance X2')return ag>=hg;if(name==='Double Chance 12')return hg!==ag;
  if(name==='Over 1.5')return t>=2;if(name==='Under 1.5')return t<2;
  if(name==='Over 2.5')return t>=3;if(name==='Under 2.5')return t<3;
  if(name==='Over 3.5')return t>=4;if(name==='Under 3.5')return t<4;
  if(name==='BTTS Yes')return hg>=1&&ag>=1;if(name==='BTTS No')return!(hg>=1&&ag>=1);
  if(name==='HT Over 0.5')return null;
  if(name.startsWith('Correct Score')){const m=name.match(/(\d+)-(\d+)/);return m?(+m[1]===hg&&+m[2]===ag):null;}
  return null;
}

function addGame(){
  const home=(document.getElementById('i-home')?.value||'').trim(),away=(document.getElementById('i-away')?.value||'').trim();
  const start=document.getElementById('i-start')?.value||'',msg=document.getElementById('i-msg');

  const oh=numVal('o-home'),odw=numVal('o-draw'),oa=numVal('o-away'),o25=numVal('o-o25');
  if(!oh||!odw||!oa||!o25)return setMsg('⚠ All 4 mandatory odds must be > 1',false);

/* ═══════════════════ BEST BET / ACCA ═══════════════════ */
function topRealLegs(pred,minProb,minOdd){return pred.markets.filter(m=>m.fromInput&&m.realEV!=null&&m.corrProb>=minProb&&m.bpOdd>=minOdd).sort((a,b)=>b.realEV-a.realEV||b.corrProb-a.corrProb);}
function sameDayLeague(a,b){return(a.start||'').slice(0,10)===(b.start||'').slice(0,10)&&(a.league||'').toLowerCase()===(b.league||'').toLowerCase()&&(a.league||'').length>0;}
function findAcca(N,target,minLeg){
  const cg=analysable().map(g=>({g,p:getPrediction(g)})).filter(x=>x.p);
  const usable=cg.map((x,idx)=>({idx,g:x.g,legs:topRealLegs(x.p,0.52,minLeg).slice(0,3)})).filter(x=>x.legs.length);
  if(usable.length<N)return{error:`Only ${usable.length} game(s) have real-entered value legs ≥ ${od(minLeg)}. Enter more optional odds or lower the minimum leg odd.`};
  let beam=[{legs:[],last:-1,odd:1,prob:1,ev:0,warn:false}];
  for(let step=0;step<N;step++){
    const next=[];
    beam.forEach(s=>{for(let i=s.last+1;i<usable.length;i++){const u=usable[i];u.legs.forEach(l=>{const warn=s.legs.some(x=>sameDayLeague(x.g,u.g));next.push({legs:[...s.legs,{g:u.g,m:l}],last:i,odd:s.odd*l.bpOdd,prob:s.prob*l.corrProb,ev:s.ev+(l.realEV||0),warn:s.warn||warn});});}});
    next.sort((a,b)=>(b.ev+b.prob*.2)-(a.ev+a.prob*.2));
    const seen=new Set();beam=[];
    [...next.slice(0,300),...next.slice(0,100).sort((a,b)=>b.odd-a.odd)].forEach(s=>{const k=s.legs.map(l=>l.g.id+l.m.name).join('|');if(!seen.has(k)){seen.add(k);beam.push(s);}});
  }
  const full=beam.filter(s=>s.legs.length===N);
  if(!full.length)return{error:'Could not build a value-only accumulator. Try entering more optional odds or adjusting settings.'};
  const valid=full.filter(s=>s.odd>=target);
  let pool=valid.length?valid.sort((a,b)=>(b.ev+b.prob*.25)-(a.ev+a.prob*.25)):full.sort((a,b)=>Math.abs(b.odd-target)-Math.abs(a.odd-target));
  return{best:pool[0],met:valid.length>0,skipped:cg.length-usable.length};
}
let lastAcca=null;
function renderBest(){
  document.getElementById('tab-bestbet').innerHTML=`<div class="eyebrow">Step 3 · Accumulator</div><div class="h-sec">Best Bet Finder</div>
  <div class="panel">
    <div class="form-grid">
      <div class="field"><label>Legs in acca</label><input id="bb-n" type="number" min="1" max="12" value="3" inputmode="numeric"></div>
      <div class="field"><label>Target combined odd</label><input id="bb-t" type="number" step="0.1" min="1" value="3.0" inputmode="decimal"></div>
      <div class="field"><label>Min odd per leg</label><input id="bb-min" type="number" step="0.01" min="1" value="1.30" inputmode="decimal"></div>
      <div class="field" style="justify-content:flex-end"><button class="btn btn-primary btn-block" onclick="runAcca()">Find best combo</button></div>
    </div>
    <p class="sub" style="margin-top:10px">Only real-entered odds used. Direction + goal-model filters applied.</p>
  </div>
  <div id="bb-out"></div>`;
  lastAcca=null;
}
function runAcca(){
  const N=Math.max(1,Math.min(12,parseInt(document.getElementById('bb-n')?.value)||3));
  const T=Math.max(1,parseFloat(document.getElementById('bb-t')?.value)||1.5);
  const minLeg=Math.max(1.01,parseFloat(document.getElementById('bb-min')?.value)||1.3);
  const out=document.getElementById('bb-out');if(!out)return;
  const res=findAcca(N,T,minLeg);
  if(res.error){out.innerHTML=`<div class="panel"><p class="sub" style="color:var(--red)">⚠ ${esc(res.error)}</p></div>`;lastAcca=null;return;}
  const b=res.best,ev=b.prob*b.odd-1;
  lastAcca={ts:Date.now(),target:T,N,combOdd:b.odd,combProb:b.prob,ev,warning:b.warn,legs:b.legs.map(l=>({gid:l.g.id,home:l.g.home,away:l.g.away,league:l.g.league,start:l.g.start,label:l.m.name,odd:l.m.bpOdd,prob:l.m.corrProb,ev:l.m.realEV||0}))};
  let html=`<div class="panel"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px"><div><div class="eyebrow">${res.met?'Target met ✅':'Closest available'}</div><div style="font-family:'Manrope';font-size:1rem;font-weight:800">${N}-game accumulator</div></div><div style="text-align:right"><div class="eyebrow">Combined odd</div><div style="font-family:'Manrope';font-size:1.9rem;font-weight:800;color:var(--brand)">${od(b.odd)}</div></div></div>
  <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><span class="chip pos">Win ${pct(b.prob)}</span><span class="chip ${ev>0?'pos':'neg'}">EV ${(ev*100).toFixed(1)}%</span><span class="chip">Target ${od(T)}</span>${b.warn?'<span class="chip neg">⚠ Same-league legs</span>':''}</div>
  ${res.skipped>0?`<div class="notice" style="margin-top:8px">⚠ Skipped ${res.skipped} game(s): no real-entered market above threshold.</div>`:''}<div class="divider"></div>`;
  b.legs.forEach(l=>{html+=`<div class="acca-leg">${crest(l.g.home)}<div style="flex:1;min-width:0"><b>${esc(l.g.home)}</b> v ${esc(l.g.away)}<br><span class="sub">${esc(l.g.league||'—')} · ${fmtShort(l.g.start)}</span></div><div class="lg-mkt"><div style="font-size:0.82rem;font-weight:700">${esc(l.m.name)}</div><span class="sub">${pct(l.m.corrProb)} · <b>${od(l.m.bpOdd)}</b> · EV ${((l.m.realEV||0)*100).toFixed(1)}%</span></div></div>`;});
  html+=`<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-lock" onclick="lockAcca()">🔐 Lock accumulator</button><span id="lock-msg" class="sub" style="align-self:center"></span></div></div>`;
  out.innerHTML=html;
}
function lockAcca(){
  if(!lastAcca)return;
  accas.push({...lastAcca,id:'acca'+Date.now()+Math.floor(Math.random()*999)});
  save();buildNav();
  const msg=document.getElementById('lock-msg');
  if(msg){msg.innerHTML='🔐 Locked! <a href="#" onclick="trackerView=\'accas\';go(\'tracker\');return false">View in tracker</a>';msg.style.color='var(--green)';}
}

/* ═══════════════════ TRACKER / SCHOOL ═══════════════════ */
function learningStats(){
  const graded=games.filter(g=>statusOf(g)==='finished'&&results[g.id]&&results[g.id].hg!=null&&g.snapshot);
  let recWon=0,recSettled=0,x12w=0,x12n=0,totw=0,totn=0,bttsw=0,bttsn=0,dcw=0,dcn=0,mWon=0,mSett=0;
  graded.forEach(g=>{
    const r=results[g.id],p=getPrediction(g),snap=g.snapshot;if(!p||!snap)return;
    const rec=evalMarket(snap.recommendation.market.name,r.hg,r.ag);
    if(rec!=null){recSettled++;if(rec)recWon++;}
    p.markets.forEach(m=>{
      if(m.corrProb>=0.55){const res=evalMarket(m.name,r.hg,r.ag);if(res==null)return;mSett++;if(res)mWon++;
        if(['Home Win','Draw','Away Win'].includes(m.name)){x12n++;if(res)x12w++;}
        if(['Over 1.5','Under 1.5','Over 2.5','Under 2.5','Over 3.5','Under 3.5'].includes(m.name)){totn++;if(res)totw++;}
        if(m.name.startsWith('BTTS')){bttsn++;if(res)bttsw++;}
        if(m.name.startsWith('Double Chance')){dcn++;if(res)dcw++;}
      }
    });
  });
  return{recWon,recSettled,mWon,mSett,x12w,x12n,totw,totn,bttsw,bttsn,dcw,dcn};
}
function roiSim(){
  const graded=games.filter(g=>statusOf(g)==='finished'&&results[g.id]&&results[g.id].hg!=null&&g.snapshot);
  const stake=1000;let staked=0,ret=0;
  const byTier={value:{bets:0,wins:0,pnl:0},highprob:{bets:0,wins:0,pnl:0},leastbad:{bets:0,wins:0,pnl:0}};
  graded.forEach(g=>{
    const r=results[g.id],s=g.snapshot,hit=evalMarket(s.recommendation.market.name,r.hg,r.ag);
    if(hit==null)return;
    staked+=stake;
    const tier=s.recommendation.tier,odd=s.recommendation.market.fromInput?s.recommendation.market.bpOdd:s.recommendation.market.estOdd;
    if(byTier[tier]){byTier[tier].bets++;if(hit){ret+=stake*odd;byTier[tier].wins++;byTier[tier].pnl+=stake*(odd-1);}else byTier[tier].pnl-=stake;}
  });
  return{stake,graded:graded.length,staked,pnl:ret-staked,roi:staked?((ret-staked)/staked*100):0,byTier};
}
function gradeAcca(a){
  let won=0,lost=0,pending=0;
  const legs=a.legs.map(l=>{
    const g=games.find(x=>x.id===l.gid);let state='pending';
    if(g&&statusOf(g)==='finished'){const r=results[l.gid];if(r&&r.hg!=null){const e=evalMarket(l.label,r.hg,r.ag);state=e==null?'pending':e?'won':'lost';}}
    if(state==='won')won++;else if(state==='lost')lost++;else pending++;
    const r=results[l.gid];
    return{...l,state,score:r&&r.hg!=null?{hg:r.hg,ag:r.ag}:null};
  });
  return{legs,won,lost,pending,status:lost>0?'lost':pending===0?'won':'pending'};
}
function accaStats(){let won=0,lost=0,settled=0,pending=0;accas.forEach(a=>{const g=gradeAcca(a);if(g.status==='won'){won++;settled++;}else if(g.status==='lost'){lost++;settled++;}else pending++;});return{won,lost,settled,pending};}
function diagnoseGame(g){
  const r=results[g.id],s=g.snapshot;if(!r||!s)return null;
  const hit=evalMarket(s.recommendation.market.name,r.hg,r.ag);
  let diag=hit===true?'confirmed':s.rms<0.08&&hit===false?'surprise':'expected';
  const reasons=[];
  if(s.rms>=0.16)reasons.push('high RMS — model fit was poor');else if(s.rms<0.08)reasons.push('low RMS — model was confident');
  if(s.recommendation.tier==='leastbad')reasons.push('Tier 3 — expected lower hit rate');
  if(!s.recommendation.market.fromInput)reasons.push('estimated market only');else reasons.push('real entered market');
  if(!s.recommendation.consistent)reasons.push('recommendation was flagged inconsistent');
  return{hit,diagnosis:diag,reasons:reasons.join('; ')};
}
let trackerOpen=null,trackerView='results';
function renderAccaTracker(aS){
  let html=`<div class="tiles"><div class="tile brand"><div class="k">Acca Win Rate</div><div class="v">${aS.settled?pct(aS.won/aS.settled):'—'}</div><div class="m">${aS.won}/${aS.settled}</div></div><div class="tile"><div class="k">Won</div><div class="v" style="color:var(--green)">${aS.won}</div></div><div class="tile"><div class="k">Lost</div><div class="v" style="color:var(--red)">${aS.lost}</div></div><div class="tile"><div class="k">Pending</div><div class="v" style="color:var(--amber)">${aS.pending}</div></div></div>`;
  if(!accas.length)return html+emptyState('No locked accas yet','Build one in Best Bet.','bestbet','Build acca');
  accas.slice().sort((a,b)=>b.ts-a.ts).forEach(a=>{
    const G=gradeAcca(a),st=G.status==='won'?'<span class="tag tag-won">🏆 WON</span>':G.status==='lost'?'<span class="tag tag-lost">LOST</span>':'<span class="tag tag-pend">PENDING</span>';
    html+=`<div class="mcard"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px"><div><div style="font-family:'Manrope';font-weight:800">${a.N}-leg · ${od(a.combOdd)}</div><span class="sub">${G.won}/${a.legs.length} won · prob ${pct(a.combProb)} · EV ${(a.ev*100).toFixed(1)}%</span></div><div style="display:flex;gap:8px">${st}<button class="btn btn-danger btn-sm" onclick="delAcca('${a.id}')">✕</button></div></div><div class="divider"></div>${G.legs.map(l=>{const badge=l.state==='won'?'<span class="dm-res dm-hit">WON ✅</span>':l.state==='lost'?'<span class="dm-res dm-miss">LOST ✗</span>':'<span class="dm-res dm-na">pending</span>';return`<div class="acca-leg">${crest(l.home)}<div style="flex:1;min-width:0"><b>${esc(l.home)}</b> v ${esc(l.away)}<br><span class="sub">${esc(l.label)} · ${od(l.odd)}${l.score?` · ${l.score.hg}-${l.score.ag}`:''}</span></div><div class="lg-mkt">${badge}</div></div>`;}).join('')}</div>`;
  });
  return html;
}
function renderTracker(){
  const fin=byStatus('finished').slice().sort((a,b)=>new Date(b.start)-new Date(a.start));
  const L=learningStats(),aS=accaStats(),learn=LEARN(),roi=roiSim();
  let html=`<div class="eyebrow">Step 4 · The school</div><div class="h-sec">Tracker</div>
  <div class="seg"><button class="${trackerView==='results'?'active':''}" onclick="trackerView='results';renderTracker()">Results <span class="pill">${fin.length}</span></button><button class="${trackerView==='accas'?'active':''}" onclick="trackerView='accas';renderTracker()">🔐 Accas <span class="pill">${accas.length}</span></button></div>`;
  if(trackerView==='accas'){html+=renderAccaTracker(aS);document.getElementById('tab-tracker').innerHTML=html;return;}
  html+=`<div class="tiles"><div class="tile brand"><div class="k">Rec hit rate</div><div class="v">${L.recSettled?pct(L.recWon/L.recSettled):'—'}</div><div class="m">one bet/game</div></div><div class="tile"><div class="k">All picked</div><div class="v">${L.mSett?pct(L.mWon/L.mSett):'—'}</div><div class="m">≥55% markets</div></div><div class="tile"><div class="k">Awaiting</div><div class="v">${fin.filter(g=>!results[g.id]||results[g.id].hg==null).length}</div><div class="m">enter scores</div></div></div>`;
  html+=`<div class="tiles"><div class="tile"><div class="k">1X2</div><div class="v">${L.x12n?pct(L.x12w/L.x12n):'—'}</div><div class="m">${L.x12w}/${L.x12n}</div></div><div class="tile"><div class="k">Totals</div><div class="v">${L.totn?pct(L.totw/L.totn):'—'}</div><div class="m">${L.totw}/${L.totn}</div></div><div class="tile"><div class="k">BTTS</div><div class="v">${L.bttsn?pct(L.bttsw/L.bttsn):'—'}</div><div class="m">${L.bttsw}/${L.bttsn}</div></div><div class="tile"><div class="k">DC</div><div class="v">${L.dcn?pct(L.dcw/L.dcn):'—'}</div><div class="m">${L.dcw}/${L.dcn}</div></div></div>`;
  // ROI — one bet per game (not per market)
  html+=`<div class="panel"><div class="panel-head"><h3>ROI simulator</h3><span class="sub">One recommendation bet per finished game</span></div><div class="diag-grid"><div class="diag"><div class="k">Stake</div><div class="v">UGX ${roi.stake.toLocaleString()}</div><div class="s">per recommendation</div></div><div class="diag"><div class="k">Graded</div><div class="v">${roi.graded}</div><div class="s">games</div></div><div class="diag"><div class="k">Staked</div><div class="v">${roi.staked.toLocaleString()}</div><div class="s">UGX total</div></div><div class="diag"><div class="k">P&L</div><div class="v" style="color:${roi.pnl>=0?'var(--green)':'var(--red)'}">${roi.pnl>=0?'+':''}${Math.round(roi.pnl).toLocaleString()}</div><div class="s">UGX</div></div><div class="diag"><div class="k">ROI</div><div class="v" style="color:${roi.roi>=0?'var(--green)':'var(--red)'}">${roi.roi.toFixed(1)}%</div><div class="s">model gauge</div></div></div><div class="divider"></div><div class="diag-grid">${Object.entries(roi.byTier).map(([k,v])=>`<div class="diag"><div class="k">${k}</div><div class="v">${v.bets?((v.wins/v.bets)*100).toFixed(1)+'%':'—'}</div><div class="s">ROI ${v.bets?((v.pnl/(v.bets*roi.stake))*100).toFixed(1):'—'}%</div></div>`).join('')}</div></div>`;
  html+=`<div class="panel"><div class="panel-head"><h3>Learning corrections</h3><span class="sub">Active after 5+ graded games</span></div><div class="diag-grid">${Object.entries(learn.corrections).map(([k,v])=>`<div class="diag"><div class="k">${k}</div><div class="v">${(v*100).toFixed(0)}%</div><div class="s">multiplier</div></div>`).join('')}</div><div class="notice" style="margin-top:10px">Applied to raw probabilities after model runs. Both raw and corrected shown in Engine tab.</div></div>`;
  html+=`<div class="panel"><div class="panel-head"><h3>Learning report</h3><span class="sub">Plain English</span></div><div class="learn-list">${learn.report.map(x=>`<div class="learn-item"><b>${esc(x)}</b></div>`).join('')}</div></div>`;
  if(!fin.length){document.getElementById('tab-tracker').innerHTML=html+emptyState('No finished games yet','Once a game passes 115 min it lands here. Enter the score to teach the school.','fixtures','See fixtures');return;}
  fin.forEach(g=>{
    const r=results[g.id]||{},done=r.hg!=null&&r.ag!=null,p=getPrediction(g),d=done&&g.snapshot?diagnoseGame(g):null;
    html+=`<div class="mcard"><div class="mcard-top">${crest(g.home)}<div class="vs-teams">${esc(g.home)} <small>vs ${esc(g.away)} · ${fmtDate(g.start)}</small></div><span class="tag tag-fin">Finished</span></div>`;
    if(!done){
      html+=`<div style="margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span class="sub">Final score:</span><div class="result-input"><input type="number" min="0" max="30" id="r-h-${g.id}" placeholder="0" inputmode="numeric"><span>:</span><input type="number" min="0" max="30" id="r-a-${g.id}" placeholder="0" inputmode="numeric"></div><button class="btn btn-primary btn-sm" onclick="saveResult('${g.id}')">Grade</button></div>`;
    } else {
      const snap=g.snapshot,wonM=[],lostM=[];
      if(p)p.markets.forEach(m=>{if(m.corrProb>=0.55){const e=evalMarket(m.name,r.hg,r.ag);if(e===true)wonM.push(m);else if(e===false)lostM.push(m);}});
      const rec=evalMarket(snap.recommendation.market.name,r.hg,r.ag);
      const diagTag=d?.diagnosis==='confirmed'?'<span class="tag diag-hit">Confirmed ✅</span>':d?.diagnosis==='surprise'?'<span class="tag diag-surprise">Surprise miss</span>':'<span class="tag diag-expected">Expected miss</span>';
      html+=`<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-family:'Manrope';font-size:1.4rem;font-weight:800">${r.hg} – ${r.ag}</span>${rec!=null?(rec?`<span class="chip pos">🏆 Rec won (${esc(snap.recommendation.market.name)})</span>`:`<span class="chip neg">Rec lost (${esc(snap.recommendation.market.name)})</span>`):''}${tierBadge(snap.recommendation.tier)}${diagTag}</div>
      <div class="notice" style="margin-top:8px"><b>Post-mortem:</b> ${esc(d?.reasons||'—')}. This game ${d?.diagnosis==='surprise'?'strongly updates the model':'feeds the school with standard weight'}.</div>
      <div style="margin-top:9px"><div class="eyebrow" style="margin-bottom:4px;color:var(--green)">✅ Won</div><div class="mkt-chips">${wonM.length?wonM.map(m=>`<span class="mc mc-won">${esc(m.name)}</span>`).join(''):'<span class="sub">none</span>'}</div></div>
      <div style="margin-top:7px"><div class="eyebrow" style="margin-bottom:4px;color:var(--red)">✗ Lost</div><div class="mkt-chips">${lostM.length?lostM.map(m=>`<span class="mc mc-lost">${esc(m.name)}</span>`).join(''):'<span class="sub">none</span>'}</div></div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="toggleTracker('${g.id}')">${trackerOpen===g.id?'Hide breakdown':'Full breakdown →'}</button><button class="btn btn-ghost btn-sm" onclick="clearResult('${g.id}')">Edit score</button></div>`;
      if(trackerOpen===g.id&&p&&snap){
        html+=`<div class="divider"></div><div class="eyebrow" style="margin-bottom:8px">Full post-mortem</div><div class="diag-grid"><div class="diag"><div class="k">Tier</div><div class="v">${snap.recommendation.tier}</div></div><div class="diag"><div class="k">RMS</div><div class="v">${(snap.rms*100).toFixed(2)}</div></div><div class="diag"><div class="k">Confidence</div><div class="v">${snap.confidenceTier}</div></div><div class="diag"><div class="k">Top score</div><div class="v">${snap.topScore}</div><div class="s">${pct(snap.topP)}</div></div><div class="diag"><div class="k">λ Total</div><div class="v">${(snap.totalLambda||0).toFixed(2)}</div></div></div>
        <div class="divider"></div><div class="eyebrow" style="margin-bottom:6px">All markets: predicted vs actual</div>
        ${snap.markets.map(m=>{const e=evalMarket(m.name,r.hg,r.ag),isRec=snap.recommendation.market.name===m.name;const badge=e==null?'<span class="dm-res dm-na">N/A</span>':e?'<span class="dm-res dm-hit">HIT ✅</span>':'<span class="dm-res dm-miss">MISS ✗</span>';return`<div class="detail-mkt" ${isRec?'style="background:var(--green-soft);margin:0 -4px;padding:8px 4px;border-radius:8px"':''}><span class="dm-name">${esc(m.name)}${isRec?' ⬅ REC':''}</span><span style="color:var(--text-2)">${pct(m.corrProb)}</span><span style="color:var(--text-3)">${m.fromInput?od(m.bpOdd):od(m.estOdd)}</span>${badge}</div>`;}).join('')}`;
      }
    }
    html+=`</div>`;
  });
  document.getElementById('tab-tracker').innerHTML=html;
}
function saveResult(id){
  const h=parseInt(document.getElementById('r-h-'+id)?.value),a=parseInt(document.getElementById('r-a-'+id)?.value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){alert('Enter valid scores (0 or above for both)');return;}
  results[id]={hg:h,ag:a};save();trackerOpen=id;renderTracker();buildNav();
}
function clearResult(id){delete results[id];save();renderTracker();}
function toggleTracker(id){trackerOpen=trackerOpen===id?null:id;renderTracker();}
function delAcca(id){accas=accas.filter(a=>a.id!==id);save();buildNav();renderTracker();}

/* ═══════════════════ RESET ═══════════════════ */
let resetAttempts=0;
function currentPwd(){const s=new Date().toLocaleTimeString('en-US',{timeZone:'Africa/Kampala',hour12:true,hour:'numeric',minute:'2-digit'});const m=s.match(/(\d+):(\d+)/);return m?m[1]+m[2]:'';}
function lockRem(){const l=+localStorage.getItem(LKEY)||0;return Math.max(0,l-Date.now());}
function openReset(){const root=document.getElementById('modal-root'),rem=lockRem();if(rem>0){root.innerHTML=lockedModal(rem);return;}resetAttempts=0;root.innerHTML=resetModal(0);setTimeout(()=>document.getElementById('reset-pass')?.focus(),60);}
function resetModal(used){return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="reset-box"><h3>⟲ Reset system</h3><p>Permanently deletes <b>all games, results and locked accas</b>. Enter passcode (current EAT time, e.g. 843 for 8:43).</p><div class="field"><label>Passcode</label><input id="reset-pass" type="password" inputmode="numeric" placeholder="• • •" onkeydown="if(event.key==='Enter')tryReset()"></div><div class="dots">${[0,1,2].map(i=>`<div class="dot ${i<used?'used':''}"></div>`).join('')}</div><div id="reset-msg" class="sub" style="min-height:18px;color:var(--red)"></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="tryReset()">Delete all</button></div></div></div>`;}
function lockedModal(rem){const mins=Math.ceil(rem/60000);return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="text-align:center"><div class="clown">🤡</div><h3 style="margin-top:10px">Locked out</h3><p>Three wrong tries. Try again in <b>${mins} min${mins!==1?'s':''}</b>.</p><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">OK</button></div></div></div>`;}
function tryReset(){
  const box=document.getElementById('reset-box'),msg=document.getElementById('reset-msg'),inp=document.getElementById('reset-pass');if(!inp)return;
  if(inp.value.trim()===currentPwd()){
    [GKEY,RKEY,AKEY].forEach(k=>localStorage.removeItem(k));
    predCache.clear();games=[];results={};accas=[];trackerOpen=null;engineSel=null;
    save();closeModal();buildNav();go('dashboard');return;
  }
  resetAttempts++;
  if(resetAttempts>=3){localStorage.setItem(LKEY,String(Date.now()+10*60000));box.classList.add('tumble');setTimeout(()=>{document.getElementById('modal-root').innerHTML=lockedModal(10*60000);},700);return;}
  box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
  if(msg){const left=3-resetAttempts;msg.textContent=left===1?'Wrong. Last try before lockout 😬':`Wrong. ${left} tries left.`;}
  const dots=box.querySelector('.dots');if(dots)dots.innerHTML=[0,1,2].map(i=>`<div class="dot ${i<resetAttempts?'used':''}"></div>`).join('');
  inp.value='';inp.focus();
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

/* ═══════════════════ BOOT ═══════════════════ */
function tick(){const el=document.getElementById('live-clock');if(el)el.textContent=new Date().toLocaleTimeString('en-GB',{timeZone:'Africa/Kampala'});}
setInterval(tick,1000);tick();
// 15-second status-only refresh — never reruns model math
let lastSnap='';
setInterval(()=>{
  const snap=games.map(g=>g.id+statusOf(g)).join(',');
  if(snap!==lastSnap){lastSnap=snap;ensureSnapshots();buildNav();if(['dashboard','fixtures','live','tracker','final','engine'].includes(currentTab))render(currentTab);}
  else if(currentTab==='live'&&byStatus('live').length)render('live');
},15000);
// Boot
ensureSnapshots();buildNav();renderDash();lastSnap=games.map(g=>g.id+statusOf(g)).join(',');
